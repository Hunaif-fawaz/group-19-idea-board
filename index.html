<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Idea Board</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#667eea,#764ba2);
font-family: 'Segoe UI', sans-serif;
}

.glass-card{
width:100%;
max-width:500px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border-radius:20px;
padding:30px;
box-shadow:0 8px 32px rgba(0,0,0,0.2);
border:1px solid rgba(255,255,255,0.2);
}

.title{
font-weight:600;
text-align:center;
color:white;
margin-bottom:25px;
}

.form-control, .form-select{
border-radius:10px;
}

.add-btn{
border-radius:10px;
font-weight:500;
padding:10px;
transition:0.3s;
}

.add-btn:hover{
transform:scale(1.05);
}

.idea-list{
margin-top:25px;
}

.idea-item{
background:rgba(255,255,255,0.25);
border-radius:10px;
padding:10px 15px;
margin-bottom:10px;
color:white;
}

.suggested{
font-size:0.9em;
opacity:0.8;
font-style:italic;
}

@media(max-width:576px){

.glass-card{
margin:20px;
padding:20px;
}

.title{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="glass-card">

<h3 class="title">💡 Group Idea Board</h3>

<div class="row g-2">

<div class="col-12 col-md-4">
<select id="name" class="form-select" onchange="filterIdeas()">
<option value="">Select name</option>
<option>Nimal</option>
<option>Sara</option>
<option>Alex</option>
<option>Hunaif</option>
</select>
</div>

<div class="col-12 col-md-5">
<input type="text" id="idea" class="form-control" placeholder="Enter your idea">
</div>

<div class="col-12 col-md-3 d-grid">
<button class="btn btn-primary add-btn" onclick="addIdea()">Add</button>
</div>

</div>

<ul id="ideaList" class="idea-list list-unstyled">

<li class="idea-item" data-user="Nimal">
Build a study planner
<span class="suggested"> – suggested by Nimal</span>
</li>

<li class="idea-item" data-user="Sara">
Start a podcast
<span class="suggested"> – suggested by Sara</span>
</li>

<li class="idea-item" data-user="Alex">
Organize a coding workshop
<span class="suggested"> – suggested by Alex</span>
</li>

</ul>

</div>

<script>

function addIdea(){

let name=document.getElementById("name").value
let idea=document.getElementById("idea").value

if(name=="" || idea==""){
alert("Please select name and enter idea")
return
}

let list=document.getElementById("ideaList")

let li=document.createElement("li")

li.className="idea-item"
li.setAttribute("data-user",name)

li.innerHTML = `
${idea}
<span class="suggested"> – suggested by ${name}</span>
`

list.appendChild(li)

document.getElementById("idea").value=""

filterIdeas()

}

function filterIdeas(){

let selectedUser=document.getElementById("name").value
let ideas=document.querySelectorAll(".idea-item")

ideas.forEach(function(item){

let ideaUser=item.getAttribute("data-user")

if(selectedUser=="" || selectedUser==ideaUser){
item.style.display="block"
}
else{
item.style.display="none"
}

})

}

</script>

</body>
</html>
