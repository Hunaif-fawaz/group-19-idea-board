<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Toolkit - Main</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
background: linear-gradient(135deg,#800000,#FFD700);
font-family:'Segoe UI',sans-serif;
color:white;
padding:20px;
transition:0.3s;
}

.dark-mode{
background:#111 !important;
color:white;
}

.navbar{
background: rgba(128,0,0,0.9);
backdrop-filter: blur(12px);
border-radius:10px;
}

.ucsc-logo{
height:40px;
width:40px;
margin-right:10px;
border-radius:50%;
object-fit:cover;
border:2px solid gold;
}

.glass-card{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(12px);
border-radius:20px;
padding:25px;
box-shadow:0 8px 32px rgba(0,0,0,0.2);
border:1px solid rgba(255,255,255,0.2);
margin-bottom:20px;
animation: fadeIn 1s ease forwards;
}

.sidebar{
min-height:300px;
}

.sidebar li{
transition:0.3s;
padding:6px;
border-radius:6px;
}

.sidebar li:hover{
transform:scale(1.05);
background:rgba(255,215,0,0.3);
box-shadow:0 0 10px gold;
cursor:pointer;
}

.title{
text-align:center;
margin-bottom:15px;
}

.logo{
display:block;
margin:0 auto 10px auto;
width:60px;
border-radius:50%;
border:2px solid white;
}

/* IDEA ITEM LAYOUT */
.idea-item{
background:rgba(255,255,255,0.25);
border-radius:10px;
padding:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

/* LEFT SIDE */
.idea-left{
flex:1;
}

/* RIGHT SIDE ACTIONS */
.idea-actions{
display:flex;
align-items:center;
gap:10px;
white-space:nowrap;
}

.idea-text{
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
text-overflow:ellipsis;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.suggested{
font-size:0.9em;
font-style:italic;
opacity:0.8;
}

.action-btn{
cursor:pointer;
font-size:0.9em;
}

.center-dropdown{
max-width:220px;
margin:auto;
}

.total-box{
text-align:center;
margin-top:10px;
}

@keyframes fadeIn{
0%{opacity:0;transform:translateY(20px);}
100%{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-3 mb-4">
<a class="navbar-brand fw-bold d-flex align-items-center">
<img src="ucsc.png" class="ucsc-logo">
Student Toolkit
</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Main Page</a></li>
<li class="nav-item"><a class="nav-link" href="gpa.html">GPA Calculator</a></li>
<li class="nav-item"><a class="nav-link" href="timer.html">Pomodoro Timer</a></li>
</ul>

<div class="form-check form-switch text-white ms-3">
<input class="form-check-input" type="checkbox" onclick="toggleDarkMode()">
<label class="form-check-label">Dark Mode</label>
</div>

</nav>

<div class="container-fluid">
<div class="row">

<div class="col-md-3">
<div class="glass-card sidebar">
<h4>Upcoming Events</h4>
<ul>
<li>Assignment Due – March 15</li>
<li>Math Quiz – March 18</li>
<li>Project Meeting – March 20</li>
<li>Final Demo – March 25</li>
</ul>
</div>
</div>

<div class="col-md-9">
<div class="glass-card">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo">

<h3 class="title">💡 Group Idea Board</h3>

<div class="row g-2">

<div class="col-12 center-dropdown">
<select id="name" class="form-select text-center" onchange="filterIdeas()">
<option value="">Select name</option>
<option>Kavindu</option>
<option>Thilina</option>
<option>Gihan</option>
<option>Hunaif</option>
<option>Dewmini</option>
<option>Hana</option>
<option>Minuka</option>
<option>Thaviru</option>
</select>
</div>

<div class="col-12">
<input type="text" id="idea" class="form-control" placeholder="Enter your idea">
</div>

</div>

<div class="text-center mt-3">
<button class="btn btn-primary me-2" onclick="addIdea()">Add</button>
<button class="btn btn-secondary" onclick="clearInput()">Clear</button>
</div>

<ul id="ideaList" class="list-unstyled mt-3"></ul>

<div class="total-box">
Total Ideas: <span id="totalIdeas">0</span>
</div>

</div>
</div>

</div>
</div>

<script>

function toggleDarkMode(){
document.body.classList.toggle("dark-mode")
}

/* LOAD SAVED IDEAS */

window.onload=function(){

let savedIdeas=JSON.parse(localStorage.getItem("ideas")) || []

savedIdeas.forEach(data=>{
displayIdea(data.name,data.idea,data.completed)
})

updateTotal()

}

/* SAVE IDEAS */

function saveIdeas(){

let ideas=[]

document.querySelectorAll(".idea-item").forEach(item=>{

ideas.push({
name:item.getAttribute("data-user"),
idea:item.querySelector(".idea-text").innerText,
completed:item.querySelector("input").checked
})

})

localStorage.setItem("ideas",JSON.stringify(ideas))

}

/* ADD IDEA */

function addIdea(){

let name=document.getElementById("name").value
let idea=document.getElementById("idea").value

if(name=="" || idea==""){
alert("Please select name and enter idea")
return
}

let savedIdeas=JSON.parse(localStorage.getItem("ideas")) || []

for(let i=0;i<savedIdeas.length;i++){
if(savedIdeas[i].idea.trim().toLowerCase()==idea.trim().toLowerCase()){
alert("This idea has already been submitted!")
return
}
}

displayIdea(name,idea,false)

saveIdeas()

document.getElementById("idea").value=""

updateTotal()

filterIdeas()

}

/* DISPLAY IDEA */

function displayIdea(name,idea,completed){

let list=document.getElementById("ideaList")

let li=document.createElement("li")
li.className="idea-item"
li.setAttribute("data-user",name)

/* LEFT SIDE */

let left=document.createElement("div")
left.className="idea-left"

let ideaSpan=document.createElement("span")
ideaSpan.className="idea-text"
ideaSpan.innerText=idea

if(completed){
ideaSpan.classList.add("completed")
}

left.appendChild(ideaSpan)

let suggested=document.createElement("span")
suggested.className="suggested"
suggested.innerText=" – suggested by "+name

left.appendChild(suggested)

/* RIGHT SIDE */

let actions=document.createElement("div")
actions.className="idea-actions"

let checkbox=document.createElement("input")
checkbox.type="checkbox"
checkbox.checked=completed
checkbox.onclick=function(){
ideaSpan.classList.toggle("completed")
saveIdeas()
}

actions.appendChild(checkbox)

let edit=document.createElement("span")
edit.className="action-btn"
edit.innerText="✏️ Edit"

edit.onclick=function(){

let newIdea=prompt("Edit your idea:",ideaSpan.innerText)

if(newIdea){
ideaSpan.innerText=newIdea
saveIdeas()
}

}

actions.appendChild(edit)

let del=document.createElement("span")
del.className="action-btn"
del.innerText="🗑 Delete"

del.onclick=function(){
li.remove()
saveIdeas()
updateTotal()
}

actions.appendChild(del)

li.appendChild(left)
li.appendChild(actions)

list.appendChild(li)

}

/* CLEAR INPUT */

function clearInput(){
document.getElementById("idea").value=""
}

/* FILTER BY USER */

function filterIdeas(){

let selectedUser=document.getElementById("name").value

let ideas=document.querySelectorAll(".idea-item")

ideas.forEach(function(item){

let ideaUser=item.getAttribute("data-user")

item.style.display=(selectedUser=="" || selectedUser==ideaUser)?"flex":"none"

})

}

/* UPDATE TOTAL */

function updateTotal(){

let total=document.querySelectorAll(".idea-item").length

document.getElementById("totalIdeas").innerText=total

}

</script>

</body>
</html>
