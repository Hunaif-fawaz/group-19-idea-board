<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA Calculator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
min-height:100vh;
background: linear-gradient(135deg,#800000,#FFD700);
font-family:'Segoe UI',sans-serif;
color:white;
padding:20px;
transition:0.3s;
}
.dark-mode{ background:#111 !important; color:white; }
.navbar{ background: rgba(128,0,0,0.9); backdrop-filter: blur(12px); border-radius:10px; }
.glass-card{ background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); border-radius:20px; padding:25px; box-shadow:0 8px 32px rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.2); margin-bottom:20px; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark px-3 mb-4">
<a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
<img src="ucsc.png" class="ucsc-logo" style="height:40px;width:40px;margin-right:10px;"> Student Toolkit
</a>
<div class="form-check form-switch text-white ms-3">
<input class="form-check-input" type="checkbox" onclick="toggleDarkMode()">
<label class="form-check-label">Dark Mode</label>
</div>
</nav>

<div class="container">
<div class="glass-card">
<h3>GPA Calculator</h3>
<p>Enter course credits and grade points</p>
<div class="row g-2">
<div class="col-md-6"><input type="number" id="credit1" class="form-control" placeholder="Course 1 Credits"></div>
<div class="col-md-6"><input type="number" id="grade1" class="form-control" placeholder="Grade Points"></div>
<div class="col-md-6"><input type="number" id="credit2" class="form-control" placeholder="Course 2 Credits"></div>
<div class="col-md-6"><input type="number" id="grade2" class="form-control" placeholder="Grade Points"></div>
<div class="col-md-6"><input type="number" id="credit3" class="form-control" placeholder="Course 3 Credits"></div>
<div class="col-md-6"><input type="number" id="grade3" class="form-control" placeholder="Grade Points"></div>
</div>
<button class="btn btn-light mt-3" onclick="calculateGPA()">Calculate GPA</button>
<h5 class="mt-3" id="gpaResult"></h5>
</div>
</div>

<script>
function toggleDarkMode(){ document.body.classList.toggle("dark-mode") }
function calculateGPA(){
let c1=Number(document.getElementById("credit1").value)
let g1=Number(document.getElementById("grade1").value)
let c2=Number(document.getElementById("credit2").value)
let g2=Number(document.getElementById("grade2").value)
let c3=Number(document.getElementById("credit3").value)
let g3=Number(document.getElementById("grade3").value)
let totalCredits=c1+c2+c3
let gpa=((c1*g1)+(c2*g2)+(c3*g3))/totalCredits
document.getElementById("gpaResult").innerText="Overall GPA: "+gpa.toFixed(2)
}
</script>
</body>
</html>
